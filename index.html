<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ruGPT-3 Small ONNX – Чат (исправлено)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #1e1e2f; color: #e0e0e0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .container {
            width: 100%; max-width: 800px;
            background: #2a2a3c; border-radius: 16px;
            padding: 25px 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.6);
        }
        h1 { font-size: 1.6rem; margin-bottom: 20px; text-align: center; color: #ffb86c; }
        .model-loader { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; align-items: center; }
        label { font-weight: 600; color: #c0c0d0; }
        select, button {
            padding: 10px 14px; border-radius: 8px; border: 1px solid #444;
            background: #1e1e2f; color: #e0e0e0; font-size: 0.95rem;
            cursor: pointer; transition: background 0.2s;
        }
        button { background: #4a4a7a; border-color: #5a5a8a; font-weight: 600; }
        button:hover:not(:disabled) { background: #5a5a9a; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        progress { flex: 1; height: 12px; border-radius: 10px; }
        progress::-webkit-progress-bar { background: #3a3a4a; border-radius: 10px; }
        progress::-webkit-progress-value { background: linear-gradient(90deg, #ffb86c, #ff79c6); border-radius: 10px; }
        .status-text { font-size: 0.9rem; color: #b0b0c0; min-width: 130px; }

        .chat { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        textarea {
            width: 100%; padding: 12px; border-radius: 12px;
            border: 1px solid #444; background: #1e1e2f;
            color: #f0f0f0; font-size: 1rem; resize: vertical;
            font-family: inherit;
        }
        textarea:focus { outline: none; border-color: #ffb86c; }
        #input-text { min-height: 80px; }
        #output-text { min-height: 150px; background: #232336; cursor: default; }
        .btn-send { align-self: flex-start; padding: 12px 28px; }
        .info-note { font-size: 0.75rem; color: #9090a0; margin-top: 12px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 ruGPT-3 Small (ONNX) – чат</h1>
        <div class="model-loader">
            <label>📦 Модель:</label>
            <select id="model-select">
                <option value="onnx/model.onnx">model.onnx (501 MB)</option>
                <option value="onnx/model_bnb4.onnx">model_bnb4.onnx (501 MB)</option>
                <option value="onnx/model_fp16.onnx">model_fp16.onnx (251 MB)</option>
                <option value="onnx/model_int8.onnx">model_int8.onnx (280 MB)</option>
                <option value="onnx/model_q4.onnx">model_q4.onnx (501 MB)</option>
                <option value="onnx/model_q4f16.onnx" selected>model_q4f16.onnx (251 MB) ★</option>
                <option value="onnx/model_quantized.onnx">model_quantized.onnx (280 MB)</option>
                <option value="onnx/model_uint8.onnx">model_uint8.onnx (280 MB)</option>
            </select>
            <button id="load-btn">⚡ Загрузить</button>
        </div>

        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
            <progress id="load-progress" value="0" max="100"></progress>
            <span id="load-status" class="status-text">Модель не загружена</span>
        </div>

        <div class="chat">
            <textarea id="input-text" placeholder="Введите промпт..."></textarea>
            <button id="send-btn" class="btn-send" disabled>📤 Отправить</button>
            <div style="display:flex; align-items:center; gap:10px;">
                <progress id="gen-progress" value="0" max="100"></progress>
                <span id="gen-status" class="status-text"></span>
            </div>
            <textarea id="output-text" readonly placeholder="Ответ..."></textarea>
        </div>
        <div class="info-note">
            Все вычисления на клиенте. Модель загружается в память браузера.
        </div>
    </div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        const loadBtn = document.getElementById('load-btn');
        const modelSelect = document.getElementById('model-select');
        const loadProgress = document.getElementById('load-progress');
        const loadStatus = document.getElementById('load-status');
        const sendBtn = document.getElementById('send-btn');
        const inputText = document.getElementById('input-text');
        const outputText = document.getElementById('output-text');
        const genProgress = document.getElementById('gen-progress');
        const genStatus = document.getElementById('gen-status');

        let generator = null;
        let isLoading = false;

        // ПОЛНАЯ конфигурация из вашего config.json
        const modelConfig = {
            "_attn_implementation_autoset": true,
            "_name_or_path": "ai-forever/rugpt3small_based_on_gpt2",
            "activation_function": "gelu_new",
            "architectures": ["GPT2LMHeadModel"],
            "attn_pdrop": 0.1,
            "bos_token_id": 1,
            "embd_pdrop": 0.1,
            "eos_token_id": 2,
            "gradient_checkpointing": false,
            "id2label": { "0": "LABEL_0" },
            "initializer_range": 0.02,
            "label2id": { "LABEL_0": 0 },
            "layer_norm_epsilon": 1e-05,
            "model_type": "gpt2",
            "n_ctx": 2048,
            "n_embd": 768,
            "n_head": 12,
            "n_inner": null,
            "n_layer": 12,
            "n_positions": 2048,
            "pad_token_id": 0,
            "reorder_and_upcast_attn": false,
            "resid_pdrop": 0.1,
            "scale_attn_by_inverse_layer_idx": false,
            "scale_attn_weights": true,
            "summary_activation": null,
            "summary_first_dropout": 0.1,
            "summary_proj_to_labels": true,
            "summary_type": "cls_index",
            "summary_use_proj": true,
            "torch_dtype": "float32",
            "transformers_version": "4.49.0",
            "use_cache": true,
            "vocab_size": 50264
        };

        loadBtn.addEventListener('click', async () => {
            if (isLoading) return;
            const modelFileName = modelSelect.value; // уже содержит "onnx/..."
            isLoading = true;
            loadBtn.disabled = true;
            sendBtn.disabled = true;
            loadStatus.textContent = 'Загрузка файлов...';
            loadProgress.value = 0;
            outputText.value = '';
            genProgress.value = 0;
            genStatus.textContent = '';

            if (generator) {
                generator = null; // очистка предыдущей сессии
            }

            try {
                generator = await pipeline(
                    'text-generation',
                    'onnx-community/rugpt3small_based_on_gpt2-ONNX',
                    {
                        model_file_name: modelFileName, // "onnx/model_q4f16.onnx"
                        // subfolder НЕ используем, чтобы config и tokenizer брались из корня
                        config: modelConfig, // явная конфигурация
                        progress_callback: (progress) => {
                            if (progress.status === 'progress') {
                                const percent = Math.floor((progress.loaded / progress.total) * 100);
                                loadProgress.value = percent;
                                loadStatus.textContent = `Файл: ${progress.file ?? ''} (${percent}%)`;
                            } else if (progress.status === 'done') {
                                loadProgress.value = 100;
                                loadStatus.textContent = 'Инициализация ONNX-сессии… (может занять минуту)';
                            } else if (progress.status === 'ready') {
                                loadProgress.value = 100;
                                loadStatus.textContent = 'Модель готова ✅';
                            }
                        }
                    }
                );
                loadStatus.textContent = '✅ Модель загружена';
                sendBtn.disabled = false;
            } catch (error) {
                loadStatus.textContent = '❌ ' + error.message;
                generator = null;
            } finally {
                isLoading = false;
                loadBtn.disabled = false;
            }
        });

        sendBtn.addEventListener('click', async () => {
            if (!generator) {
                alert('Сначала загрузите модель');
                return;
            }
            const prompt = inputText.value.trim();
            if (!prompt) {
                alert('Введите текст');
                return;
            }

            sendBtn.disabled = true;
            genProgress.value = 0;
            genStatus.textContent = 'Генерация…';
            outputText.value = '';

            const maxNewTokens = 100;
            try {
                const result = await generator(prompt, {
                    max_new_tokens: maxNewTokens,
                    temperature: 0.7,
                    top_k: 50,
                    do_sample: true,
                    callback_function: (beams) => {
                        const tokenIds = beams[0].output_token_ids;
                        const decoded = generator.tokenizer.decode(tokenIds, {
                            skip_special_tokens: true
                        });
                        outputText.value = decoded;
                        genProgress.value = Math.min((tokenIds.length / maxNewTokens) * 100, 100);
                    }
                });
                outputText.value = result[0].generated_text;
                genProgress.value = 100;
                genStatus.textContent = '✅ Готово';
            } catch (error) {
                genStatus.textContent = '❌ ' + error.message;
            } finally {
                sendBtn.disabled = false;
            }
        });

        inputText.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                sendBtn.click();
            }
        });
    </script>
</body>
</html>
